name: Publish Sandbox Image

on:
  push:
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag (e.g. 0.1.0, latest)'
        required: true
        default: 'latest'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  SANDBOX_IMAGE: xprobe/xagent-sandbox
  PLATFORMS: linux/amd64,linux/arm64

jobs:
  build-and-push:
    timeout-minutes: 60
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Extract metadata for sandbox
        id: meta-sandbox
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.SANDBOX_IMAGE }}
          tags: |
            type=semver,pattern={{version}},enable=${{ github.event_name == 'push' }}
            type=raw,value=latest,enable=${{ github.event_name == 'push' }}
            type=raw,value=${{ github.event.inputs.tag || 'latest' }},enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Build and push sandbox image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.sandbox
          platforms: ${{ env.PLATFORMS }}
          push: true
          tags: ${{ steps.meta-sandbox.outputs.tags }}
          labels: ${{ steps.meta-sandbox.outputs.labels }}
          cache-from: type=registry,ref=${{ env.SANDBOX_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.SANDBOX_IMAGE }}:buildcache,mode=max
