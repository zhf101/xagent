id: sales-inbound-agent
name: Inbound Agent
category: Sales
featured: true
descriptions:
  en: Processes inbound leads, researches prospect, scores and qualifies leads. Initiates
    calendar bookings for qualified prospects and updates CRM
  zh: 处理入站线索，研究潜在客户，对线索进行评分和资格审查。为合格的潜在客户发起日历预订并更新CRM。
features:
  en:
  - Qualifies & scores inbound leads
  - Books meetings for qualified prospects
  - Updates CRM automatically
  zh:
  - 对入站线索进行资格审查和评分
  - 为合格的潜在客户预订会议
  - 自动更新CRM
