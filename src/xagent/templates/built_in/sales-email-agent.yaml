id: sales-email-agent
name: Email Agent (Sales)
category: Sales
featured: false
descriptions:
  en: Writes personalised email outreach to list of leads, contacts them and updates
    the CRM. Flags and prioritises replies to human reps
  zh: 为潜在客户列表撰写个性化的电子邮件外展，联系他们并更新CRM。标记并优先处理给人类代表的回复。
features:
  en:
  - Sends personalised outreach emails
  - Updates CRM with responses
  - Flags priority replies to reps
  zh:
  - 发送个性化的外展电子邮件
  - 用回复更新CRM
  - 向代表标记优先回复
