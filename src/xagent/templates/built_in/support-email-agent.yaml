name: Email Agent (Support)
category: Support
featured: false
descriptions:
  en: Monitors the support inbox, triages and responds to customer enquiries, and
    follows up on open tickets.
  zh: 监控支持收件箱，对客户咨询进行分类和响应，并跟进未解决的工单。
features:
  en:
  - Monitors & triages support inbox
  - Responds to customer enquiries
  - Follows up on open tickets
  zh:
  - 监控并分类支持收件箱
  - 响应客户咨询
  - 跟进未解决的工单
