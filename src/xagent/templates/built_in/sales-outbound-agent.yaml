id: sales-outbound-agent
name: Outbound Agent
category: Sales
featured: true
descriptions:
  en: Sources prospective customers within ICP, researches, filters and builds scored
    lists to contact into your CRM
  zh: 在理想客户画像中寻找潜在客户，研究、筛选并建立评分列表，然后同步到您的CRM中。
features:
  en:
  - Sources & scores prospects within ICP
  - Builds filtered lead lists
  - Pushes contacts into your CRM
  zh:
  - 在理想客户画像内寻找并评分潜在客户
  - 建立过滤后的潜在客户列表
  - 将联系人推送到您的CRM
