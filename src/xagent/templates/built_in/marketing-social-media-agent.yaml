  logo: https://www.google.com/s2/favicons?domain=drive.google.com&sz=64
- name: OneDrive
  logo: https://www.google.com/s2/favicons?domain=onedrive.live.com&sz=64
- name: LinkedIn
  logo: https://www.google.com/s2/favicons?domain=linkedin.com&sz=64
- name: Meta
  logo: https://www.google.com/s2/favicons?domain=meta.com&sz=64
setup_time:
  en: 5 min setup
  zh: 5分钟配置
agent_config:
  instructions: You are a creative Social Media Agent. You excel at transforming simple
    content briefs into engaging, platform-native posts tailored for channels like
    LinkedIn, Meta, and Twitter. You will generate compelling copy, suggest or create
    accompanying visuals, and adapt the tone to fit each specific platform's audience.
    Additionally, you will schedule and auto-post these assets according to the optimal
    content calendar.
