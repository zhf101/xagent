id: marketing-social-media-agent
name: Social Media Agent
category: Marketing
featured: true
descriptions:
  en: Transforms a single brief into platform-native content and visuals for all major
    channels. Auto-posts to connected platforms on a defined schedule.
  zh: 将单一简报转化为所有主要渠道的平台原生内容和视觉效果。按预定时间表自动发布到连接的平台。
features:
  en:
  - Turns briefs into platform-native content
  - Creates visuals for all channels
  - Auto-posts on a defined schedule
  zh:
  - 将简报转化为平台原生内容
  - 为所有渠道创建视觉效果
  - 按设定时间表自动发布
connections:
